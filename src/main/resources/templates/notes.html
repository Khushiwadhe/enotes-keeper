<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enotes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .navbar-custom {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .glass-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        .note-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            transition: 0.3s;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .search-box {
            border-radius: 25px;
            padding: 10px;
        }

        .badge-user {
            background: #ffc107;
            color: black;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">

        <span class="navbar-brand fw-bold">📒 Enotes</span>

        <div>
            <span class="badge-user">
                👤 <span th:text="${username}"></span>
            </span>
            <a href="/logout" class="btn btn-light btn-sm ms-2">Logout</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <!-- 🔍 SEARCH + COUNT -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <form method="get" action="/notes" class="w-50">
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="🔍 Search notes..."
                   class="form-control search-box">
        </form>

        <div class="text-white">
            📊 Total Notes: <b th:text="${#lists.size(notes)}"></b>
        </div>

    </div>

    <!-- ➕ ADD NOTE -->
    <div class="glass-card mb-4">
        <h4>Add Note</h4>
        <form th:action="@{/saveNote}" method="post">
            <input type="text" name="title" class="form-control mb-2" placeholder="Title" required>
            <textarea name="content" class="form-control mb-2" placeholder="Write your thoughts..." required></textarea>
            <button class="btn btn-light">Save</button>
        </form>
    </div>

    <!-- 📋 NOTES GRID -->
    <div class="row">
        <div class="col-md-4 mb-3" th:each="n : ${notes}">
            <div class="note-card">

                <h5 th:text="${n.title}"></h5>
                <p th:text="${n.content}"></p>

                <div class="d-flex justify-content-between">
                    <a th:href="@{'/edit/' + ${n.id}}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{'/delete/' + ${n.id}}" class="btn btn-danger btn-sm">Delete</a>
                </div>

            </div>
        </div>
    </div>

    <!-- 📄 PAGINATION -->
    <nav>
        <ul class="pagination justify-content-center mt-4">

            <li class="page-item" th:if="${currentPage > 0}">
                <a class="page-link"
                   th:href="@{/notes(page=${currentPage-1}, keyword=${keyword})}">
                    ⬅ Prev
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:href="@{/notes(page=${i}, keyword=${keyword})}"
                   th:text="${i+1}">
                </a>
            </li>

            <li class="page-item" th:if="${currentPage < totalPages-1}">
                <a class="page-link"
                   th:href="@{/notes(page=${currentPage+1}, keyword=${keyword})}">
                    Next ➡
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
