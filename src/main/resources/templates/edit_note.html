<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Note</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 col-md-6 card p-4 shadow">

    <h3>Edit Note</h3>

    <form th:action="@{/updateNote}" method="post">
        <input type="hidden" name="id" th:value="${note.id}">
        <input type="text" name="title" class="form-control mb-3" th:value="${note.title}" required>
        <textarea name="content" class="form-control mb-3" th:text="${note.content}" required></textarea>
        <button class="btn btn-success w-100">Update</button>
    </form>

</div>

</body>
</html>
